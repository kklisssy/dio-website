{% include "statistics_section.html" with indicators=page.indicators layout="about" %}
<style>
    .statistics-section--about .statistics-section__container {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 1.15fr);
        grid-template-areas: "stats header";
        gap: clamp(64px, 9vw, 144px);
        align-items: start;
        border-bottom: 1px solid #dedede;
        border-radius: 0;
    }

    .statistics-section--about .statistics-section__header {
        grid-area: header;
        margin: 0;
        padding: 0;
        border: 0;
        text-align: left;
    }

    .statistics-section--about .statistics-section__title {
        margin: 0 0 20px;
    }

    .statistics-section--about .statistics-section__grid {
        grid-area: stats;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 48px 24px;
    }

    .statistics-section--about .statistics-section__item {
        padding-top: 12px;
        border-top: 1px solid #aeb9da;
        text-align: left;
    }

    .statistics-section--about .statistics-section__value {
        margin-bottom: 10px;
        font-size: clamp(48px, 4.2vw, 68px);
        letter-spacing: -0.04em;
    }

    .statistics-section--about .statistics-section__label {
        --text-size: 14px;
        color: var(--color-muted);
        font-weight: 400;
    }

    @media (max-width: 991px) {
        .statistics-section--about .statistics-section__container {
            grid-template-columns: 1fr;
            grid-template-areas:
                "header"
                "stats";
            gap: 48px;
        }
    }

    @media (max-width: 720px) {
        .statistics-section--about .statistics-section__grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 36px 18px;
        }

        .statistics-section--about .statistics-section__value {
            font-size: clamp(38px, 12vw, 52px);
        }
    }
</style>
