services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "80:8080"
    env_file:
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: dio_website.settings.production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-True}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        echo '1. Applying migrations...' &&
        python manage.py migrate --noinput &&
        echo '2. Bootstrapping Wagtail site...' &&
        python manage.py bootstrap_site &&
        echo '3. Creating superuser...' &&
        python manage.py ensure_superuser &&
        echo '4. Collecting static files...' &&
        python manage.py collectstatic --noinput --clear &&
        echo '5. Starting production Django server...' &&
        exec gunicorn dio_website.wsgi:application --bind 0.0.0.0:8080 --workers 3 --timeout 60 --access-logfile - --error-logfile -
      "
    volumes:
      - static_data:/app/static
      - media_data:/app/media

  postgres:
    image: postgres:16.9
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  static_data:
  media_data:
